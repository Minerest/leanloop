# config.toml — STATIC defaults for leanloop.py
#
# Per-project leanfile.toml files deep-merge on top of this. Anything you
# put here is shared across every project that uses this leanloop.py.
# Anything you put in leanfile.toml overrides what's here.
#
# leanloop.py exports the [lean] settings as LEAN_* env vars before exec'ing
# the wrapper at lean.binary, which is why the wrapper scripts in leaners/
# can stay minimal.

[lean]
binary        = "/home/ediaz/projects/lean-loop/leaners/qwen-ctx.sh"                  # resolved relative to this config.toml
base_url      = "http://127.0.0.1:8080/v1"
api_key       = "not-needed"
model         = "Qwen3.6-35B-A3B-UD-Q4_K_M.gguf"
approval_mode = "yolo"
timeout       = 600                                   # wrapper wall-clock budget per call (sec)

[health]
check_url = "http://127.0.0.1:8080/health"
max_wait  = 60

[mcp]
max_file_chars = 32000              # per-file char limit for lean-mcp's ask_about tool
# project_root: optional override for the LeanLoop MCP server's repo root.
#   Resolution order: $LEAN_PROJECT_ROOT env var → this key → cwd().
#   Relative paths are resolved against the directory containing config.toml.
#   Most setups don't need this — the server inherits cwd from Qwen CLI.
# project_root = "/absolute/path/to/project"


[defaults]
source_window         = 30
error_tail_lines      = 40
max_iters_per_task    = 5
after_command_timeout = 600
project_root          = "."

# Prepend to every model call (task prompt, error summary, fix prompt).
# Use this for global constraints that must apply across all tasks —
# e.g. MCP tool-use requirements, output format rules.
# Per-project conventions (import style, patterns) stay in QWEN.md
# via qwen-ctx.sh --append-system-prompt.
global_message = """
This project uses a lean-mcp MCP server for repository search and test execution.
You MUST use the following MCP tools for code understanding and verification:

- find_symbol(name, path='.', fuzzy=false) — O(1) in-memory lookup of where a function/class/constant is *defined*. Returns {symbols: {name: {file, line, type, language}}}. Prefer this over rg_search when you want to find a definition (not usages). Use fuzzy=true for prefix matching.
- rg_search(query, path='.', file_glob?, case_sensitive?) — Regex search across files. Returns {matches: [{file, line, text}]}. Capped at 50 results. Use for finding usages, patterns, or anything find_symbol can't answer.
- rg_files(query, path='.') — Filenames only. Returns {files: [...]}.
- rg_context(query, path='.', before=5, after=10) — Matches with surrounding context. Returns {matches: [{file, start_line, context: [...]}]}.
- run_tests(command, cwd?, timeout=300) — Execute test commands with structured results.

Prefer find_symbol for "where is X defined?" — it's faster and returns structured type info.
Use rg_search/rg_context for code understanding instead of reading entire files.
Use rg_files to locate files before inspecting them.
Use run_tests to verify changes instead of guessing.

Any output that does not use these tools for code search and verification is considered INVALID.
"""
